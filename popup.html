<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Peekaboo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #FF8C5A;
      --accent-hover: #F07040;
      --accent-light: #FFF0E6;
      --accent-deep: #C25A1A;

      --text: #2D1B0E;
      --muted: #B07040;
      --muted-soft: #C09070;

      --border: #FFD4B0;
      --border-soft: #FFF0E6;

      --bg: #FFF8F1;
      --surface: #ffffff;

      --success: #22c55e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
    }

    /* ── Header ───────────────── */
    .header {
      background: var(--accent);
      overflow: hidden;
      height: 30px;
      display: flex;
      align-items: center;
      border-radius: 0;
    }

    .ticker {
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: scrollTicker 14s linear infinite;
    }

    .ticker-track span {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1.2px;
      white-space: nowrap;
      padding-right: 40px;
      text-transform: uppercase;
    }

    /* ── Main Card ───────────────── */
    .main-card {
      background: var(--bg);
      padding: 16px;
    }

    /* ── Title Row ───────────────── */
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 12px rgba(255,140,90,0.35);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .tab-count {
      background: var(--accent-light);
      border: 2px solid var(--border);
      border-radius: 50px;
      padding: 5px 12px;
      text-align: center;
    }

    .tab-count .tab-num {
      display: block;
      font-size: 17px;
      font-weight: 700;
      color: var(--accent-deep);
      line-height: 1;
    }

    .tab-count small {
      font-size: 9px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Divider ───────────────── */
    .divider {
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 14px;
    }

    /* ── Mascot + Message ───────────────── */
    .mascot-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .mascot-box {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(255,140,90,0.3);
      animation: bob 3s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .message-bubble {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      flex: 1;
      font-weight: 500;
      box-shadow: 0 2px 10px rgba(194,90,26,0.06);
    }

    .message-bubble.empty {
      color: var(--muted-soft);
      font-style: italic;
    }

    /* ── Meta ───────────────── */
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 500;
    }

    .tone-badge-pill {
      background: var(--accent-light);
      color: var(--accent-deep);
      border-radius: 50px;
      padding: 2px 9px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Tone ───────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .tone-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tone-pill {
      padding: 5px 12px;
      border: 2px solid var(--border);
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: var(--muted);
      background: var(--surface);
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
    }

    .tone-pill:hover {
      border-color: var(--accent);
      color: var(--accent-deep);
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    .tone-pill.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 3px 10px rgba(255,140,90,0.28);
    }

    /* ── Button ───────────────── */
    .refresh-btn {
      width: 100%;
      margin-top: 14px;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 16px rgba(255,140,90,0.32);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }

    .refresh-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 22px rgba(255,140,90,0.38);
    }

    .refresh-btn:active {
      transform: scale(0.97);
    }

    @keyframes scrollTicker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>

<body>

  <!-- Header ticker -->
  <div class="header">
    <div class="ticker">
      <div class="ticker-track">
        <span>Peekaboo is watching ✦ your tabs ✦ no browsing goes unnoticed ✦ </span>
        <span>Peekaboo is watching ✦ your tabs ✦ no browsing goes unnoticed ✦ </span>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-card">

    <!-- Title row -->
    <div class="title-row">
      <div class="brand">
        <div class="brand-logo">🍊</div>
        <div class="brand-text">
          <span class="brand-name">Peekaboo</span>
          <span class="brand-sub">Reads the room ☁️</span>
        </div>
      </div>
      <div class="tab-count" id="tab-count">
        <span class="tab-num" id="tab-num">--</span>
        <small>tabs open</small>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Message -->
    <div class="mascot-row">
      <div class="mascot-box">
        <span id="mascot-emoji">🐱</span>
      </div>
      <div class="message-bubble" id="message-text">
        Loading your latest vibe...
      </div>
    </div>

    <div class="meta-row">
      <span id="message-time"></span>
      <span id="tone-badge" class="tone-badge-pill"></span>
    </div>

    <!-- Tone -->
    <div class="section-label">Set the vibe</div>
    <div class="tone-row" id="tone-row"></div>

    <!-- Button -->
    <button class="refresh-btn" id="refresh-btn">✦ Check in now</button>

  </div>

  <script src="popup.js"></script>

</body>

</html>
