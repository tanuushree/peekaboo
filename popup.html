<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Peekaboo</title>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #ff4520;
      --black: #0b0b0b;
      --text: #e5e5e5;
      --muted: #777;
      --border: #1a1a1a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--black);
      color: var(--text);
      width: 320px;
    }

    /* ── Header (Ticker) ───────────────── */
    .header {
      background: var(--red);
      overflow: hidden;
      height: 28px;
      display: flex;
      align-items: center;
    }

    /* ticker container */
    .ticker {
      width: 100%;
      overflow: hidden;
      position: relative;
    }

    /* moving track */
    .ticker-track {
      display: flex;
      width: max-content;
      animation: scrollTicker 12s linear infinite;
    }

    /* text */
    .ticker-track span {
      font-size: 11px;
      font-weight: 700;
      color: #000;
      letter-spacing: 1px;
      white-space: nowrap;
      padding-right: 40px;
    }

    /* ── Main Card ───────────────── */
    .main-card {
      background: #000;
      padding: 14px;
      border-top: 4px solid var(--red);
    }

    /* ── Title Row ───────────────── */
    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--red);
    }

    .title span {
      color: #fff;
    }

    .tab-count {
      text-align: right;
      font-size: 18px;
      color: var(--red);
    }

    .tab-count small {
      font-size: 9px;
      color: #666;
    }

    /* ── Stripe ───────────────── */
    .stripe {
      height: 6px;
      background: repeating-linear-gradient(45deg,
          var(--red),
          var(--red) 6px,
          #000 6px,
          #000 12px);
      margin-bottom: 12px;
    }

    /* ── Mascot + Message ───────────────── */
    .mascot-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mascot-box {
      background: var(--red);
      padding: 10px;
      font-size: 20px;
      clip-path: polygon(0 0, 100% 0, 100% 75%, 75% 100%, 0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message-bubble {
      background: #0f0f0f;
      border-left: 3px solid var(--red);
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #ddd;
      flex: 1;
    }

    .message-bubble.empty {
      color: var(--muted);
      font-style: italic;
    }

    /* ── Meta ───────────────── */
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Tone ───────────────── */
    .tone-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .tone-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tone-pill {
      padding: 5px 11px;
      border: 1px solid #222;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: #aaa;
      background: transparent;
    }

    .tone-pill.active {
      border-color: var(--red);
      color: var(--red);
    }

    /* ── Button ───────────────── */
    .refresh-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: var(--red);
      border: none;
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }

    .refresh-btn:hover {
      opacity: 0.9;
    }

    @keyframes scrollTicker {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="ticker">
      <div class="ticker-track">
        <span>PEEKABOO IS WATCHING ✦ YOUR TABS ✦ NO BROWSING GOES UNNOTICED ✦ </span>
        <span>PEEKABOO IS WATCHING ✦ YOUR TABS ✦ NO BROWSING GOES UNNOTICED ✦ </span>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-card">

    <!-- Title -->
    <div class="title-row">
      <div class="title">PEEK<span>ABOO</span></div>
      <div class="tab-count" id="tab-count">
        --<br><small>TABS OPEN</small>
      </div>
    </div>

    <div class="stripe"></div>

    <!-- Message -->
    <div class="mascot-row">
      <div class="mascot-box">
        <span id="mascot-emoji">🐱</span>
      </div>
      <div class="message-bubble" id="message-text">
        Loading your latest vibe...
      </div>
    </div>

    <div class="meta-row">
      <span id="message-time"></span>
      <span id="tone-badge"></span>
    </div>

    <!-- Tone -->
    <div class="tone-label">Set the vibe</div>
    <div class="tone-row" id="tone-row"></div>

    <!-- Button -->
    <button class="refresh-btn" id="refresh-btn">✦ CHECK IN NOW</button>

  </div>

  <script src="popup.js"></script>

</body>

</html>
