  <line x1="10" y1="40" x2="25" y2="40" stroke="#c1440e" stroke-width="0.8" opacity="0.5"/>
  <line x1="39" y1="38" x2="54" y2="37" stroke="#c1440e" stroke-width="0.8" opacity="0.5"/>
  <line x1="39" y1="40" x2="54" y2="40" stroke="#c1440e" stroke-width="0.8" opacity="0.5"/>
  <!-- Cheeks -->
