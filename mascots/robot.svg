<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Antenna -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="3" fill="#6366f1"/>
  <!-- Head -->
  <rect x="10" y="14" width="44" height="36" rx="8" fill="#4b5563"/>
  <!-- Face plate -->
  <rect x="14" y="18" width="36" height="28" rx="5" fill="#374151"/>
  <!-- Eyes -->
  <rect x="18" y="24" width="10" height="8" rx="3" fill="#6366f1"/>
  <rect x="36" y="24" width="10" height="8" rx="3" fill="#6366f1"/>
  <!-- Eye glow -->
  <rect x="20" y="26" width="4" height="3" rx="1.5" fill="#a5b4fc" opacity="0.8"/>
  <rect x="38" y="26" width="4" height="3" rx="1.5" fill="#a5b4fc" opacity="0.8"/>
  <!-- Mouth display -->
  <rect x="18" y="36" width="28" height="6" rx="3" fill="#1f2937"/>
  <rect x="20" y="37.5" width="5" height="3" rx="1.5" fill="#22c55e"/>
  <rect x="27" y="37.5" width="5" height="3" rx="1.5" fill="#22c55e"/>
  <rect x="34" y="37.5" width="5" height="3" rx="1.5" fill="#22c55e"/>
  <!-- Side bolts -->
  <circle cx="10" cy="25" r="2" fill="#6b7280"/>
  <circle cx="54" cy="25" r="2" fill="#6b7280"/>
  <circle cx="10" cy="38" r="2" fill="#6b7280"/>
  <circle cx="54" cy="38" r="2" fill="#6b7280"/>
</svg>
